services:
  - type: web
    name: paperclip
    runtime: docker
    repo: https://github.com/Construct-AI-primary/paperclip-render.git
    branch: master
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3100
      - key: SERVE_UI
        value: true
      - key: PAPERCLIP_HOME
        value: /paperclip
      - key: PAPERCLIP_INSTANCE_ID
        value: default
      - key: PAPERCLIP_CONFIG
        value: /paperclip/instances/default/config.json
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: private
      - key: DATABASE_URL
        sync: false
      - key: PAPERCLIP_AGENT_JWT_SECRET
        sync: false
    disk:
      name: paperclip-data
      mountPath: /paperclip
      sizeGB: 10
