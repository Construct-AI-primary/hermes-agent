services:
  - type: web
    name: paperclip
    runtime: node
    repo: https://github.com/Construct-AI-primary/paperclip-render.git
    branch: master
    buildCommand: "npm install -g pnpm@9.15.4 && pnpm install --frozen-lockfile && pnpm --filter @paperclipai/shared build && pnpm --filter @paperclipai/adapter-utils build && pnpm --filter @paperclipai/adapter-claude-local build && pnpm --filter @paperclipai/adapter-codex-local build && pnpm --filter @paperclipai/adapter-cursor-local build && pnpm --filter @paperclipai/adapter-gemini-local build && pnpm --filter @paperclipai/adapter-openclaw-gateway build && pnpm --filter @paperclipai/adapter-opencode-local build && pnpm --filter @paperclipai/adapter-pi-local build && pnpm --filter @paperclipai/db build && pnpm --filter @paperclipai/plugin-sdk build && pnpm --filter @paperclipai/ui build && pnpm --filter @paperclipai/server build"
    startCommand: "NODE_OPTIONS=--dns-result-order=ipv4first node server/dist/index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: SERVE_UI
        value: true
      - key: PAPERCLIP_HOME
        value: /paperclip
      - key: PAPERCLIP_INSTANCE_ID
        value: default
      - key: PAPERCLIP_CONFIG
        value: /paperclip/instances/default/config.json
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: private
      - key: DATABASE_URL
        sync: false
      - key: PAPERCLIP_AGENT_JWT_SECRET
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_BASE_URL
        value: https://paperclip-render.onrender.com
      - key: PAPERCLIP_MIGRATION_AUTO_APPLY
        value: "true"
      - key: PAPERCLIP_DB_BACKUP_ENABLED
        value: "true"
    disk:
      name: paperclip-data
      mountPath: /paperclip
      sizeGB: 10
