# Cross-Team Collaboration Rules
collaboration:
  # Development workflow: Loopy designs → DevForge implements → QualityForge validates
  development_workflow:
    - team: loopy
      role: design
      next: devforge
    - team: devforge
      role: implement
      next: qualityforge
    - team: qualityforge
      role: validate
      next: complete

  # Security workflow: QualityForge tests → DevForge fixes → QualityForge validates
  security_workflow:
    - team: qualityforge
      role: security-test
      next: devforge
    - team: devforge
      role: security-fix
      next: qualityforge
    - team: qualityforge
      role: security-validate
      next: complete

# Task Routing Rules
routing:
  # Default routing based on keywords
  keyword_matching: true
  
  # Fallback team if no keyword match
  default_team: devforge
  
  # Priority override for critical tasks
  priority_overrides:
    - keywords: ["security", "vulnerability", "incident"]
      team: devforge
      division: security
      priority: 1
    
    - keywords: ["production", "outage", "critical"]
      team: devforge
      division: executive
      priority: 1

# Health Check Configuration
health_checks:
  interval_seconds: 60
  timeout_seconds: 10
  unhealthy_threshold: 3
  healthy_threshold: 2

# Monitoring Configuration
monitoring:
  metrics_enabled: true
  logging_enabled: true
  alerting_enabled: true
  retention_days: 30