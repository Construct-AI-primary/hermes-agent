schema: paperclip/v1

# KnowledgeForge AI - Adapter Configuration
# All agents use the hermes_local adapter type for running via the Hermes agent runtime.

agents:
  # ============================================
  # Knowledge Engineering Team Agents
  # ============================================

  knowledgeforge-doc-analyzer:
    adapter:
      type: hermes_local
      config:
        model: openrouter/qwen/qwen-3-6-plus
        maxIterations: 50
    inputs:
      env:
        OPENROUTER_API_KEY:
          kind: secret
          requirement: required
    settings:
      persistSession: true
      enabledToolsets: ["file_tools", "terminal_tools"]

