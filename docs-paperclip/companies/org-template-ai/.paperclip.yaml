schema: paperclip/v1

# Adapter configuration for all agents in this organisation
# All agents use the same model by default - override per-agent if needed
agents:
  org-template-ai-ceo:
    adapter:
      type: hermes_local
      config:
        model: openrouter/anthropic/claude-sonnet-4.5
        maxIterations: 50
        persistSession: true
    inputs:
      env:
        OPENROUTER_API_KEY:
          kind: secret
          requirement: required

  org-template-ai-engineering-lead:
    adapter:
      type: hermes_local
      config:
        model: openrouter/anthropic/claude-sonnet-4.5
        maxIterations: 50
        persistSession: true
    inputs:
      env:
        OPENROUTER_API_KEY:
          kind: secret
          requirement: required

# Recurring task routines
routines:
  weekly-review:
    triggers:
      - kind: schedule
        cronExpression: "0 9 * * 1"
        timezone: UTC